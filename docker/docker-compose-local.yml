services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
    - "6379:6379"
    command: redis-server --port 6379
    labels:
    - "name=redis"
    - "mode=standalone"
  mysql:
    image: mysql:8.4.3
    container_name: mysql
    restart: always
    ports:
    - "3306:3306"
    environment:
      MYSQL_DATABASE: gotchai
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command: [ "mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci" ]
