services:
  backend:
    image: ${IMAGE_URI}
    container_name: gotchai-server
    restart: always
    environment:
    - TZ=Asia/Seoul
    network_mode: host
    depends_on:
    - redis
  redis:
    image: redis:alpine
    container_name: redis
    ports:
    - "6379:6379"
    environment:
    - TZ=Asia/Seoul
    network_mode: "host"
    command: [ "redis-server", "--maxmemory", "64mb" ]
  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    ports:
    - "9090:8080"
    environment:
    - URLS_PRIMARY_NAME=gotchai
    - "URLS=[{ url: 'https://${API_SPECIFICATION_BUCKET}.s3.amazonaws.com/api.yml', name: 'gotchai' }]"
    - SUPPORTED_SUBMIT_METHODS=['get']
