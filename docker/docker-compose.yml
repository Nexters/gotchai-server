services:
  backend:
    image: ${IMAGE_FULL_URL}
    container_name: gotchai-dev
    restart: always
    environment:
      - TZ=Asia/Seoul
    network_mode: host
    env_file:
      - ~/.env
    depends_on:
      - redis
  redis:
    image: redis:alpine
    container_name: gotchai-redis
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Seoul
    network_mode: "host"
    command: [ "redis-server", "--maxmemory", "64mb"]
  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    ports:
      - "8080:8080"
    environment:
      - URLS_PRIMARY_NAME=gotchai
      - "URLS=[{ url: 'https://${API_SPECIFICATION_BUCKET}.s3.amazonaws.com/api.yml', name: 'gotchai' }]"
      - SUPPORTED_SUBMIT_METHODS=['get']
    env_file:
      - ~/.env
