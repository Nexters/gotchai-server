services:
  gotchai-server:
    image: ${IMAGE_URI}
    container_name: gotchai-server
    restart: always
    environment:
    - TZ=Asia/Seoul
    ports:
    - "8080:8080"
    depends_on:
    - redis
    env_file:
    - .env
  redis:
    image: redis:alpine
    container_name: redis
    ports:
    - "6379:6379"
    environment:
    - TZ=Asia/Seoul
    network_mode: "host"
    command: [ "redis-server", "--maxmemory", "64mb" ]
  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    restart: always
    ports:
    - "9090:8080"
    volumes:
    - ./api.yml:/usr/share/nginx/html/api.yml
    environment:
      URLS: "[{url: 'api.yml', name: 'Gotchai server'}]"
      SWAGGER_JSON: /api.yml
